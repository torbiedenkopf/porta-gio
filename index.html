<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Porta Gio Café Bistro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Porta Gio</h1>
    <p>Café • Bistro • Genuss</p>
</header>

<nav>
    <a href="#home">Start</a>
    <a href="#menu">Speisekarte</a>
    <a href="#contact">Kontakt</a>
</nav>

<section id="home">
    <h2>Willkommen</h2>
    <p>Italienisches Café-Bistro mit frischen Speisen, Kaffee und Atmosphäre.</p>
</section>

<section id="menu">
    <h2>Speisekarte</h2>

    <details>
        <summary>Speisekarte öffnen</summary>
        <iframe src="speisekarte.pdf"></iframe>
    </details>

    <p><a href="speisekarte.pdf" target="_blank">PDF herunterladen</a></p>
</section>

<section id="contact">
    <h2>Kontakt</h2>

    <form action="#" method="POST">
        <input type="text" placeholder="Name" required>
        <input type="email" placeholder="E-Mail" required>
        <textarea placeholder="Nachricht" required></textarea>
        <button type="submit">Senden</button>
    </form>
</section>

<footer>
    <p>© 2026 Porta Gio</p>
</footer>

</body>
</html>
